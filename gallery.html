<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Image Gallery</title>
    <link rel="stylesheet" href="gallery.css">
</head>
<body>

<header>
    <h1>Creative Image Gallery</h1>
    <p>Responsive Gallery with Lightbox</p>
</header>

<div class="filter-buttons">
<button class="active" onclick="filterImages('all', this)">All</button>
<button onclick="filterImages('Keyboard', this)">Keyboard</button>
<button onclick="filterImages('Travel', this)">Travel</button>
<button onclick="filterImages('Space', this)">Space</button>
<button onclick="filterImages('Technology', this)">Technology</button>
<button onclick="filterImages('Company', this)">Company</button>
</div>

<div class="gallery">

   <div class="image Keyboard">
    <img src="img1.jpg" onclick="openImage(this.src)" alt="Keyboard">
</div>

<div class="image Travel">
    <img src="img2.jpg" onclick="openImage(this.src)" alt="Travel">
</div>

<div class="image Space">
    <img src="img3.jpg" onclick="openImage(this.src)" alt="Space">
</div>

<div class="image Technology">
    <img src="img4.jpg" onclick="openImage(this.src)" alt="Technology">
</div>

<div class="image Company">
    <img src="img5.jpg" onclick="openImage(this.src)" alt="Company">
</div>




</div>

<div id="lightbox">
    <span onclick="closeImage()">&times;</span>
    <img id="lightbox-img">
</div>

<script src="gallery.js"></script>

</body>
</html>
